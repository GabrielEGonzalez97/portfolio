<app-card *ngIf="publication" [title]="publication.title" [subtitle]="publication.abstract"
    footerButtonText="Link to paper" [footerButtonLink]="publication.publicationLink">
    <div id="awards" *ngIf="publication.bestPaperAwards.length > 0">
        <ng-container *ngFor="let bestPaperAward of publication.bestPaperAwards">
            <div class="award-container" (click)="openLinkNewTab(bestPaperAward.link)">
                {{ bestPaperAward.award }}
                <img class="award-icon" src="assets/icons/achievement-award-medal-icon.svg" alt="best paper award">
            </div>
        </ng-container>
    </div>

    <div id="card-extra-details">
        <div class="metadata-row authors">
            <svg class="metadata-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                <path
                    d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" />
            </svg>
            <div class="authors-list">
                <ng-container *ngFor="let author of publication.authors; let i = index">
                    <span [ngClass]="{'highlight-author': author.name === portfolioAuthorName}">
                        {{ author.name }}<span class="comma" *ngIf="i < publication.authors.length - 1">,</span>
                    </span>
                </ng-container>
            </div>
        </div>
        <div class="metadata-row publication-date">
            <svg class="metadata-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                <path
                    d="M19 3h-1V1h-2v2H8V1H6v2H5C3.89 3 3.01 3.9 3.01 5L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11z" />
            </svg>
            <span>{{ publication.publicationDate }}</span>
        </div>
        <div class="metadata-row presented-at">
            <svg class="metadata-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                <path
                    d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z" />
            </svg>
            <span>{{ publication.presentedAt }}</span>
        </div>
    </div>
</app-card>
